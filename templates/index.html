<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>AI App</title>
    <style>
        body {
            font-family: Arial;
            max-width: 700px;
            margin: 50px auto;
        }

        input {
            width: 80%;
            padding: 10px;
        }

        button {
            padding: 10px;
        }

        #output {
            margin-top: 20px;
            white-space: pre-wrap;
            background: #f4f4f4;
            padding: 15px;
            border-radius: 8px;
        }
    </style>
</head>
<body>

<h2>AI Chat</h2>

<input id="input" placeholder="Type message...">
<button onclick="send()">Send</button>

<div id="output"></div>

<script>
async function send() {
    const message = document.getElementById("input").value;

    const res = await fetch("/chat", {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify({ message })
    });

    const data = await res.json();

    let output = "";

    if (data.type === "answer") {
        output = data.content;
    } 
    else if (data.type === "task") {
        output = "📌 " + data.title + "\n\n" + data.steps.map(s => "- " + s).join("\n");
    } 
    else {
        output = JSON.stringify(data, null, 2);
    }

    document.getElementById("output").innerText = output;
}
</script>

</body>
</html>
